name: Quality Check
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validasi File Utama
        run: |
          if [ ! -f index.html ]; then
            echo "Error: index.html tidak ditemukan!"
            exit 1
          fi
          echo "Struktur folder aman untuk di-deploy!"
